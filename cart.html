<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Bag</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfbff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 30px 24px; }
        .item { 
            display: flex; gap: 15px; align-items: center; background: #fff; 
            padding: 15px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .item img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; }
        .info { flex: 1; }
        .info h4 { margin: 0; font-size: 0.95rem; }
        .info p { margin: 4px 0; color: #86868b; font-size: 0.8rem; }
        .remove { color: #ff70a6; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; padding: 30px 24px; 
            background: #fff; border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }
        .total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; }
        .btn-check { width: 100%; padding: 20px; background: #8a70d6; color: #fff; border: none; border-radius: 20px; font-weight: 700; }
    </style>
</head>
<body>
    <h2 style="font-weight: 800; margin-bottom: 25px;">My Bag</h2>
    <div id="cartList"></div>
    <div class="footer">
        <div class="total"><span>Total</span><span id="totalPrice">Rp 0</span></div>
        <button class="btn-check">Checkout Now</button>
    </div>

    <script>
        function load() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const list = document.getElementById('cartList');
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `
                <div class="item">
                    <img src="${item.img}">
                    <div class="info">
                        <h4>${item.name}</h4>
                        <p>Rp ${item.price.toLocaleString()}</p>
                        <span class="remove" onclick="remove(${i})">Remove Item</span>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = "Rp " + total.toLocaleString();
        }
        function remove(i) {
            let cart = JSON.parse(localStorage.getItem('cart'));
            cart.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            load();
        }
        load();
    </script>
</body>
</html>
