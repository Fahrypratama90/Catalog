<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Universe | Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8a70d6;
            --secondary: #ff70a6;
            --bg: #fdfbff;
            --text-main: #1d1d1f;
            --text-gray: #a1a1a8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        .blob {
            position: absolute; width: 300px; height: 300px;
            background: var(--primary); filter: blur(100px);
            opacity: 0.12; z-index: -1; animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .login-card {
            width: 88%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 30px;
            border-radius: 40px;
            border: 2px solid var(--white);
            box-shadow: 0 25px 50px rgba(138, 112, 214, 0.1);
            text-align: center;
            animation: cardAppear 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #changingText {
            font-size: 2.8rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 3s linear infinite;
            transition: opacity 0.5s;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .subtitle { font-size: 1rem; font-weight: 600; color: var(--text-gray); margin-bottom: 40px; }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; margin-left: 15px; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-main); }

        input {
            width: 100%; padding: 20px 25px; border-radius: 25px; border: 2px solid transparent;
            background: var(--white); font-family: inherit; font-size: 1rem; font-weight: 700;
            color: var(--text-main); box-shadow: 0 10px 20px rgba(0,0,0,0.02); outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); transform: translateY(-2px); }

        .btn-login {
            width: 100%; padding: 20px; margin-top: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: var(--white); border: none; border-radius: 25px; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; box-shadow: 0 15px 35px rgba(138, 112, 214, 0.35); transition: 0.3s;
        }

        .btn-login:active { transform: scale(0.94); }

        .footer-links { margin-top: 30px; font-size: 0.9rem; font-weight: 700; color: var(--text-gray); }
        .footer-links a { color: var(--primary); text-decoration: none; cursor: pointer; }

        #loginMsg { color: #ff4d4d; font-size: 0.8rem; font-weight: 700; margin-top: 10px; display: none; padding: 0 10px; }
        .success { color: #2ecc71 !important; }
    </style>
</head>
<body>

    <div class="blob" style="top: -5%; left: -5%;"></div>
    <div class="blob" style="bottom: -5%; right: -5%; background: var(--secondary);"></div>

    <div class="login-card">
        <h1 id="changingText">Hello.</h1>
        <p class="subtitle">Log in to your elite account</p>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>

        <div id="loginMsg"></div>

        <button class="btn-login" onclick="handleLogin()">Sign In</button>

        <div class="footer-links">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMXAHOZTLKZakFNcS1h6qwbSjzIuLqTCY",
            authDomain: "catalog-19c63.firebaseapp.com",
            projectId: "catalog-19c63",
            storageBucket: "catalog-19c63.firebasestorage.app",
            messagingSenderId: "635781678036",
            appId: "1:635781678036:web:f0124efd1523de71ee8c41"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Animasi Teks Judul
        const words = ["Hello.", "Welcome.", "Catalog."];
        let index = 0;
        setInterval(() => {
            const textEl = document.getElementById('changingText');
            if(textEl) {
                textEl.style.opacity = 0;
                setTimeout(() => {
                    index = (index + 1) % words.length;
                    textEl.innerText = words[index];
                    textEl.style.opacity = 1;
                }, 500);
            }
        }, 3000);

        // Fungsi Login Firebase
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const btn = document.querySelector('.btn-login');

            if(!email || !pass) {
                showMsg("Please fill all fields!", "error");
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showMsg("Login Successful!", "success");
                setTimeout(() => { window.location.href = 'main.html'; }, 1200);
            } catch (error) {
                btn.innerText = "Sign In";
                btn.disabled = false;
                showMsg(translateError(error.code), "error");
            }
        };

        function showMsg(text, type) {
            const msg = document.getElementById('loginMsg');
            msg.innerText = text;
            msg.style.display = 'block';
            msg.className = type === 'success' ? 'success' : '';
        }

        function translateError(code) {
            switch(code) {
                case 'auth/user-not-found': return 'Email not registered!';
                case 'auth/wrong-password': return 'Wrong password!';
                case 'auth/invalid-email': return 'Invalid email format!';
                case 'auth/invalid-credential': return 'Invalid email or password!';
                default: return 'Authentication failed!';
            }
        }
    </script>
</body>
</html>
